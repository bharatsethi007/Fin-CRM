
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdvisorFlow CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
  <body class="font-sans">
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.getElementById('root');
        if (el && !el.hasChildNodes()) {
          el.innerHTML = '<div style="padding:24px;font-family:sans-serif;max-width:600px"><h2 style="color:#dc2626">AdvisorFlow failed to load</h2><pre style="background:#fef2f2;padding:12px;overflow:auto;font-size:12px">' + (e.message || 'Unknown error') + '</pre></div>';
        }
      });
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
