
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdvisorFlow CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              primary: {
                '50': '#eff6ff',
                '100': '#dbeafe',
                '200': '#bfdbfe',
                '300': '#93c5fd',
                '400': '#60a5fa',
                '500': '#3b82f6',
                '600': '#2563eb',
                '700': '#1d4ed8',
                '800': '#1e40af',
                '900': '#1e3a8a',
                '950': '#172554',
              },
            }
          }
        }
      }
    </script>
</head>
  <body class="bg-gray-100 dark:bg-gray-900 font-sans">
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.getElementById('root');
        if (el && !el.hasChildNodes()) {
          el.innerHTML = '<div style="padding:24px;font-family:sans-serif;max-width:600px"><h2 style="color:#dc2626">AdvisorFlow failed to load</h2><pre style="background:#fef2f2;padding:12px;overflow:auto;font-size:12px">' + (e.message || 'Unknown error') + '</pre></div>';
        }
      });
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
